# ============================================================
#  GitHub Actions CI/CD Pipeline
#  Employee Management System
#
#  Triggers: push to main branch
#
#  Jobs:
#    1. build-and-test    (CI)
#    2. docker-build-push (Build & push to ECR)
#    3. deploy-to-ec2     (CD)
# ============================================================

name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  AWS_REGION:         ${{ secrets.AWS_REGION }}
  ECR_REGISTRY:       ${{ secrets.ECR_REGISTRY }}
  BACKEND_REPO:       emp-backend
  FRONTEND_REPO:      emp-frontend

# ─────────────────────────────────────────────────────────────
# JOB 1: Build & Test
# ─────────────────────────────────────────────────────────────
jobs:
  build-and-test:
    name: 🔨 Build & Test
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout source code ──────────────────────────
      - name: Checkout Repository
        uses: actions/checkout@v4

      # ── 2. Set up Java 17 (with Maven cache) ─────────────
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      # ── 3. Build Spring Boot (run tests) ─────────────────
      - name: Build Spring Boot
        run: mvn clean package -B
        working-directory: backend
        env:
          # Use H2 in-memory for CI tests
          SPRING_PROFILES_ACTIVE: test

      # ── 4. Upload JAR as artifact ─────────────────────────
      - name: Upload Backend JAR
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: backend/target/*.jar
          retention-days: 1

      # ── 5. Set up Node 20 ─────────────────────────────────
      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      # ── 6. Install & build React ──────────────────────────
      - name: Install Frontend Dependencies
        run: npm ci
        working-directory: frontend

      - name: Build React App
        run: npm run build
        working-directory: frontend

      - name: Upload Frontend Build
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/dist/
          retention-days: 1

  # ─────────────────────────────────────────────────────────────
  # JOB 2: Docker Build & Push to ECR
  # Only on push to main (not on PRs)
  # ─────────────────────────────────────────────────────────────
  docker-build-push:
    name: 🐳 Docker Build & Push to ECR
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    outputs:
      image-tag: ${{ steps.meta.outputs.tag }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # ── Download built artifacts ──────────────────────────
      - name: Download Backend JAR
        uses: actions/download-artifact@v4
        with:
          name: backend-jar
          path: backend/target/

      - name: Download Frontend Build
        uses: actions/download-artifact@v4
        with:
          name: frontend-build
          path: frontend/dist/

      # ── Configure AWS credentials ─────────────────────────
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ secrets.AWS_REGION }}

      # ── Login to Amazon ECR ───────────────────────────────
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # ── Generate image tag (short SHA) ────────────────────
      - name: Generate Image Tag
        id: meta
        run: echo "tag=${GITHUB_SHA::8}" >> $GITHUB_OUTPUT

      # ── Build & Push BACKEND image ────────────────────────
      - name: Build & Push Backend Image
        env:
          IMAGE_TAG: ${{ steps.meta.outputs.tag }}
        run: |
          docker build \
            -t $ECR_REGISTRY/$BACKEND_REPO:$IMAGE_TAG \
            -t $ECR_REGISTRY/$BACKEND_REPO:latest \
            ./backend
          docker push $ECR_REGISTRY/$BACKEND_REPO:$IMAGE_TAG
          docker push $ECR_REGISTRY/$BACKEND_REPO:latest
          echo "✅ Backend image pushed: $ECR_REGISTRY/$BACKEND_REPO:$IMAGE_TAG"

      # ── Build & Push FRONTEND image ───────────────────────
      - name: Build & Push Frontend Image
        env:
          IMAGE_TAG: ${{ steps.meta.outputs.tag }}
        run: |
          docker build \
            -t $ECR_REGISTRY/$FRONTEND_REPO:$IMAGE_TAG \
            -t $ECR_REGISTRY/$FRONTEND_REPO:latest \
            ./frontend
          docker push $ECR_REGISTRY/$FRONTEND_REPO:$IMAGE_TAG
          docker push $ECR_REGISTRY/$FRONTEND_REPO:latest
          echo "✅ Frontend image pushed: $ECR_REGISTRY/$FRONTEND_REPO:$IMAGE_TAG"

  # ─────────────────────────────────────────────────────────────
  # JOB 3: Deploy to EC2
  # ─────────────────────────────────────────────────────────────
  deploy-to-ec2:
    name: 🚀 Deploy to EC2
    runs-on: ubuntu-latest
    needs: docker-build-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Deploy via SSH to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key:      ${{ secrets.EC2_SSH_KEY }}
          envs:     ECR_REGISTRY,AWS_REGION,BACKEND_REPO,FRONTEND_REPO
          script: |
            set -e  # Exit on any error

            IMAGE_TAG="${{ needs.docker-build-push.outputs.image-tag }}"
            echo "🚀 Deploying image tag: $IMAGE_TAG"

            # ── Login to ECR from EC2 ───────────────────────
            aws ecr get-login-password --region ${{ secrets.AWS_REGION }} | \
              docker login --username AWS --password-stdin ${{ secrets.ECR_REGISTRY }}

            # ── Pull latest images ──────────────────────────
            echo "📥 Pulling backend image..."
            docker pull ${{ secrets.ECR_REGISTRY }}/emp-backend:latest

            echo "📥 Pulling frontend image..."
            docker pull ${{ secrets.ECR_REGISTRY }}/emp-frontend:latest

            # ── Stop and remove old containers ──────────────
            echo "🛑 Stopping old containers..."
            docker stop emp-backend  2>/dev/null || true
            docker rm   emp-backend  2>/dev/null || true
            docker stop emp-frontend 2>/dev/null || true
            docker rm   emp-frontend 2>/dev/null || true

            # ── Create network if needed ────────────────────
            docker network create emp-network 2>/dev/null || true

            # ── Run Backend ─────────────────────────────────
            echo "▶️  Starting backend..."
            docker run -d \
              --name emp-backend \
              --network emp-network \
              --restart unless-stopped \
              -p 8080:8080 \
              -e DB_URL="${{ secrets.DB_URL }}" \
              -e DB_USERNAME="${{ secrets.DB_USERNAME }}" \
              -e DB_PASSWORD="${{ secrets.DB_PASSWORD }}" \
              -e JWT_SECRET="${{ secrets.JWT_SECRET }}" \
              -e SPRING_PROFILES_ACTIVE=docker \
              --log-driver=awslogs \
              --log-opt awslogs-region=${{ secrets.AWS_REGION }} \
              --log-opt awslogs-group=/emp/backend \
              --log-opt awslogs-stream=backend-$IMAGE_TAG \
              ${{ secrets.ECR_REGISTRY }}/emp-backend:latest

            # ── Wait for backend health ─────────────────────
            echo "⏳ Waiting for backend to be healthy..."
            for i in $(seq 1 12); do
              if curl -sf http://localhost:8080/actuator/health > /dev/null; then
                echo "✅ Backend is healthy!"
                break
              fi
              echo "  Attempt $i/12 — waiting 10s..."
              sleep 10
            done

            # ── Run Frontend ────────────────────────────────
            echo "▶️  Starting frontend..."
            docker run -d \
              --name emp-frontend \
              --network emp-network \
              --restart unless-stopped \
              -p 80:80 \
              --log-driver=awslogs \
              --log-opt awslogs-region=${{ secrets.AWS_REGION }} \
              --log-opt awslogs-group=/emp/frontend \
              --log-opt awslogs-stream=frontend-$IMAGE_TAG \
              ${{ secrets.ECR_REGISTRY }}/emp-frontend:latest

            # ── Clean up dangling images ────────────────────
            docker image prune -f

            echo ""
            echo "✅ Deployment complete!"
            echo "   Backend  → http://$(curl -s http://169.254.169.254/latest/meta-data/public-ipv4):8080"
            echo "   Frontend → http://$(curl -s http://169.254.169.254/latest/meta-data/public-ipv4)"

      # ── Post-deploy health check from GitHub Actions ──────
      - name: Verify Deployment Health
        run: |
          sleep 15
          echo "Checking application health from GitHub Actions runner..."
          curl -sf http://${{ secrets.EC2_HOST }}/api/actuator/health \
            -H "Accept: application/json" && \
            echo "✅ Application is live!" || \
            echo "⚠️  Health check failed — check EC2 logs"
