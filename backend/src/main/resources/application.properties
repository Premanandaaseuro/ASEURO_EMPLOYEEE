# ======================================
# Spring Application Configuration
# Environment variables override these
# ======================================

spring.application.name=employee-management

# --- Server ---
server.port=${SERVER_PORT:8080}

# --- Database (PostgreSQL) ---
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/employeedb}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# --- JPA / Hibernate ---
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=${DDL_AUTO:update}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# --- Active Profile ---
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# --- JWT ---
jwt.secret=${JWT_SECRET:MyS3cr3tK3yForJWTThatIsAtLeast256BitsLongForSecurity1234567890}
jwt.expiration=${JWT_EXPIRATION:86400000}

# --- Actuator (Health Checks + Metrics for CloudWatch) ---
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always
management.info.env.enabled=true

# --- App Info ---
info.app.name=Employee Management System
info.app.version=1.0.0
info.app.description=CI/CD Demo Project

# --- Logging ---
logging.level.com.emp=INFO
logging.level.org.springframework.security=WARN
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
