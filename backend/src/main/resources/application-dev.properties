# =============================================
# application-dev.properties
# Uses H2 in-memory DB — no PostgreSQL needed!
# Run with: -Dspring.profiles.active=dev
# =============================================

spring.datasource.url=jdbc:h2:mem:employeedb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# H2 console (browse DB at http://localhost:8080/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Allow H2 console through security
spring.h2.console.settings.web-allow-others=false

# JWT
jwt.secret=MyS3cr3tK3yForJWTThatIsAtLeast256BitsLongForSecurity1234567890
jwt.expiration=86400000

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# Logging
logging.level.com.emp=DEBUG
logging.level.org.springframework.security=WARN
